version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - kafka-net

  broker1:
    image: confluentinc/cp-kafka:7.5.0
    container_name: broker1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker1:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    networks:
      - kafka-net

  broker2:
    image: confluentinc/cp-kafka:7.5.0
    container_name: broker2
    depends_on:
      - zookeeper
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker2:29093,PLAINTEXT_HOST://localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    networks:
      - kafka-net

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      - broker1
      - broker2
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo 'Waiting for broker1...'
        until kafka-topics --bootstrap-server broker1:29092 --list > /dev/null 2>&1; do
          echo 'broker1 not ready, retrying in 3s...'
          sleep 3
        done
        echo 'Waiting for broker2...'
        until kafka-topics --bootstrap-server broker2:29093 --list > /dev/null 2>&1; do
          echo 'broker2 not ready, retrying in 3s...'
          sleep 3
        done
        echo 'Creating Topic1...'
        kafka-topics --bootstrap-server broker1:29092 --create --if-not-exists --topic Topic1 --replication-factor 2 --partitions 3
        echo 'Creating Topic2...'
        kafka-topics --bootstrap-server broker1:29092 --create --if-not-exists --topic Topic2 --replication-factor 2 --partitions 3
        echo 'Done. Topics:'
        kafka-topics --bootstrap-server broker1:29092 --list
    networks:
      - kafka-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - broker1
      - broker2
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker1:29092,broker2:29093
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - kafka-net

  producer:
    build: ./producer
    container_name: kafka-producer
    depends_on:
      - kafka-init
    volumes:
      - ./data:/app/data
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker1:29092,broker2:29093
      CSV_FILE_PATH: /app/data/Divvy_Trips_2019_Q4.csv
      TOPIC1: Topic1
      TOPIC2: Topic2
      BATCH_SIZE: "500"
      DELAY_SECONDS: "0.001"
    networks:
      - kafka-net

networks:
  kafka-net:
    driver: bridge
