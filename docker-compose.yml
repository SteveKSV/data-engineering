version: "3.9"

services:
  zookeeper:
    platform: linux/amd64
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    restart: unless-stopped
    ports:
      - '32181:32181'
      - '2888:2888'
      - '3888:3888'
    environment:
      ZOOKEEPER_CLIENT_PORT: 32181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - kafka

  kafka-ui:
    container_name: kafka-ui 
    image: provectuslabs/kafka-ui:latest
    ports:
      - 8087:8080
    depends_on:
      - broker-1
      - broker-2
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker-1:29091,broker-2:29092
    networks:
      - kafka

  broker-1:
    platform: linux/amd64
    image: confluentinc/cp-kafka:7.4.0
    container_name: broker-1
    restart: unless-stopped
    ports:
      - '29091:29091'
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:32181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker-1:29091
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29091
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 1
    networks:
      - kafka

  broker-2:
    platform: linux/amd64
    image: confluentinc/cp-kafka:7.4.0
    container_name: broker-2
    restart: unless-stopped
    ports:
      - '29092:29092'
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:32181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker-2:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 1
    networks:
      - kafka

  producer:
    platform: linux/amd64
    container_name: producer
    build: .
    command: python producer.py
    restart: always
    environment:
      - BOOTSTRAP_SERVERS=broker-1:29091,broker-2:29092
      - TOPIC1=Topic1
      - TOPIC2=Topic2
      - PYTHONUNBUFFERED=1
    depends_on:
      - broker-1
      - broker-2
    networks:
      - kafka

  consumer1:
    platform: linux/amd64
    container_name: consumer1
    build: .
    command: python consumer1.py
    restart: always
    environment:
      - BOOTSTRAP_SERVERS=broker-1:29091,broker-2:29092
      - TOPIC=Topic1
      - CONSUMER_GROUP=group1
      - PYTHONUNBUFFERED=1
    depends_on:
      - broker-1
      - broker-2
    networks:
      - kafka

  consumer2:
    platform: linux/amd64
    container_name: consumer2
    build: .
    command: python consumer2.py
    restart: always
    environment:
      - BOOTSTRAP_SERVERS=broker-1:29091,broker-2:29092
      - TOPIC=Topic2
      - CONSUMER_GROUP=group2
      - PYTHONUNBUFFERED=1
    depends_on:
      - broker-1
      - broker-2
    networks:
      - kafka

networks:
  kafka:
    name: kafka